<tr class="border-b align-top">
  <td class="py-2 pr-3">{{ f.display_order }}</td>
  <td class="py-2 pr-3 font-mono text-xs">{{ f.name }}</td>
  <td class="py-2 pr-3">
    <form method="post" action="/settings/extraction/{{ f.field_id }}/update"
          class="flex flex-col gap-1">
      <input name="label" value="{{ f.label }}"
             class="border rounded px-2 py-1 text-sm">
      <input name="description" value="{{ f.description }}"
             class="border rounded px-2 py-1 text-xs">
      <div class="flex items-center gap-2">
        <input type="number" name="display_order" value="{{ f.display_order }}"
               class="border rounded px-2 py-1 text-xs w-20">
        <label class="text-xs flex items-center gap-1">
          <input type="checkbox" name="is_active" value="true"
                 {% if f.is_active %}checked{% endif %}>
          active
        </label>
        <button type="submit"
                class="px-2 py-1 bg-slate-800 text-white rounded text-xs hover:bg-slate-700">
          Save
        </button>
      </div>
    </form>
  </td>
  <td class="py-2 pr-3 text-xs">{{ f.data_type.value }}</td>
  <td class="py-2 pr-3 text-xs">{{ "Yes" if f.is_active else "No" }}</td>
  <td class="py-2 pr-3 text-xs">{% if f.is_core %}Core{% endif %}</td>
  <td class="py-2 pr-3">
    {% if not f.is_core %}
      <form method="post" action="/settings/extraction/{{ f.field_id }}/delete"
            onsubmit="return confirm('Delete field?');">
        <button type="submit"
                class="px-2 py-1 bg-red-100 text-red-800 rounded text-xs hover:bg-red-200">
          Delete
        </button>
      </form>
    {% endif %}
  </td>
</tr>
