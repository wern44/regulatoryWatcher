{% extends "base.html" %}
{% block title %}Discovery run {{ run.run_id if run else run_id }} - RegWatch{% endblock %}
{% block content %}
<div class="max-w-5xl mx-auto p-6 space-y-4">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold">CSSF Discovery run {{ run.run_id if run else run_id }}</h1>
    <a href="/discovery/runs" class="text-sm text-blue-700 hover:underline">&laquo; all runs</a>
  </div>
  <div id="run-status"
       hx-get="/discovery/runs/{{ run.run_id if run else run_id }}/status"
       hx-trigger="every 2s"
       hx-swap="outerHTML">
    {% include "discovery/_run_status.html" %}
  </div>
</div>
{% endblock %}
