{% extends "base.html" %}
{% block title %}RegWatch — New Q&amp;A Session{% endblock %}
{% block content %}
  <a href="/chat" class="text-sm text-slate-500 hover:underline">&larr; Sessions</a>
  <h1 class="text-2xl font-bold mt-2 mb-4">New Q&amp;A Session</h1>

  <form method="post" action="/chat" class="bg-white p-5 rounded shadow-sm border space-y-4 max-w-3xl">
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">Session title</label>
      <input name="title" placeholder="e.g. DORA obligations for AIFMs" required
             class="border rounded px-3 py-2 w-full">
    </div>

    {# --- Filter checkboxes --- #}
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">Include</label>
      <div class="flex flex-wrap gap-x-6 gap-y-1 text-sm">
        <label class="flex items-center gap-1.5">
          <input type="checkbox" id="chk-in-force" checked onchange="applyFilters()">
          <span>In-force only</span>
        </label>
        <label class="flex items-center gap-1.5">
          <input type="checkbox" id="chk-all-lifecycle" onchange="applyFilters()">
          <span>All lifecycles</span>
        </label>
        <span class="text-slate-300">|</span>
        <label class="flex items-center gap-1.5">
          <input type="checkbox" id="chk-all-entities" checked onchange="applyFilters()">
          <span>All in-scope entities</span>
        </label>
        {% for at in auth_types %}
        <label class="flex items-center gap-1.5">
          <input type="checkbox" class="chk-entity" value="{{ at }}" checked onchange="applyFilters()">
          <span>{{ at }}</span>
        </label>
        {% endfor %}
        <label class="flex items-center gap-1.5">
          <input type="checkbox" id="chk-out-of-scope" onchange="applyFilters()">
          <span>Include out-of-scope entities</span>
        </label>
      </div>
    </div>

    {# --- Regulation multi-select --- #}
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-1">
        Scope
        <span class="font-normal text-slate-400">— regulations this session covers</span>
      </label>
      <select name="regulation_ids" id="reg-select" multiple
              class="w-full border rounded px-2 py-1 text-sm" size="10">
        {% for r in reg_options %}
          <option value="{{ r.regulation_id }}"
                  data-entities="{{ r.entity_types | join(',') }}"
                  data-in-scope="{{ r.in_scope|lower }}"
                  data-in-force="{{ r.in_force|lower }}"
                  data-lifecycle="{{ r.lifecycle_stage }}">
            {{ r.reference_number }} — {{ r.title[:70] }}{% if r.title|length > 70 %}…{% endif %}
            {% if not r.in_force %} ({{ r.lifecycle_stage }}){% endif %}
          </option>
        {% endfor %}
      </select>
      <p class="text-xs text-slate-400 mt-1">
        <span id="scope-count">0</span> of <span id="visible-count">0</span> selected
        · <a href="#" onclick="selectAllVisible(); return false" class="text-blue-600 hover:underline">select all</a>
        · <a href="#" onclick="selectNone(); return false" class="text-blue-600 hover:underline">clear</a>
      </p>
    </div>

    <div class="pt-2">
      <button class="px-4 py-2 bg-slate-800 text-white rounded hover:bg-slate-700" type="submit">
        Create session
      </button>
    </div>
  </form>

  <script>
    const sel = document.getElementById('reg-select');
    const chkInForce = document.getElementById('chk-in-force');
    const chkAllLifecycle = document.getElementById('chk-all-lifecycle');
    const chkAllEntities = document.getElementById('chk-all-entities');
    const chkOutOfScope = document.getElementById('chk-out-of-scope');
    const entityBoxes = document.querySelectorAll('.chk-entity');

    // "In-force only" and "All lifecycles" are mutually exclusive
    chkInForce.addEventListener('change', () => {
      if (chkInForce.checked) chkAllLifecycle.checked = false;
      applyFilters();
    });
    chkAllLifecycle.addEventListener('change', () => {
      if (chkAllLifecycle.checked) chkInForce.checked = false;
      applyFilters();
    });

    // "All in-scope entities" toggles individual entity checkboxes
    chkAllEntities.addEventListener('change', () => {
      entityBoxes.forEach(cb => cb.checked = chkAllEntities.checked);
      applyFilters();
    });
    entityBoxes.forEach(cb => cb.addEventListener('change', () => {
      const allChecked = [...entityBoxes].every(b => b.checked);
      chkAllEntities.checked = allChecked;
      applyFilters();
    }));

    function applyFilters() {
      const showAllLifecycle = chkAllLifecycle.checked;
      const showOutOfScope = chkOutOfScope.checked;
      const selectedEntities = new Set(
        [...entityBoxes].filter(cb => cb.checked).map(cb => cb.value)
      );

      for (const opt of sel.options) {
        const inForce = opt.dataset.inForce === 'true';
        const entities = opt.dataset.entities ? opt.dataset.entities.split(',') : [];
        const hasEntity = entities.some(e => selectedEntities.has(e));
        const isInScope = opt.dataset.inScope === 'true';

        // Lifecycle filter
        const lifecycleOk = showAllLifecycle || inForce;
        // Entity filter
        const entityOk = showOutOfScope || hasEntity || (selectedEntities.size === 0 && isInScope);

        const show = lifecycleOk && entityOk;
        opt.hidden = !show;
        opt.selected = show;
      }
      updateCounts();
    }

    function updateCounts() {
      let visible = 0, selected = 0;
      for (const opt of sel.options) {
        if (!opt.hidden) { visible++; if (opt.selected) selected++; }
      }
      document.getElementById('scope-count').textContent = selected;
      document.getElementById('visible-count').textContent = visible;
    }

    function selectAllVisible() {
      for (const opt of sel.options) { if (!opt.hidden) opt.selected = true; }
      updateCounts();
    }
    function selectNone() {
      for (const opt of sel.options) opt.selected = false;
      updateCounts();
    }

    sel.addEventListener('change', updateCounts);
    applyFilters();
  </script>
{% endblock %}
